<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC / CR Filter Calculator — Electo</title>
<link rel="stylesheet" href="../../shared.css">
<style>
/* Page-local layout: three-up field row on wide screens, stacks to two
   then one as the viewport narrows. The chart is the hero of this page,
   so it gets extra vertical breathing room on wider screens. */
.app{max-width:960px}
.fields-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.fields-row .field{min-width:0;margin-bottom:0}
.chart-canvas{height:420px}
@media (max-width:640px){
  .fields-row{grid-template-columns:1fr}
  .chart-canvas{height:340px}
}
</style>
</head>
<body>

<div class="app">
  <a href="../../index.html" class="back-link">&larr; All tools</a>

  <div class="header" style="margin-top:.6rem">
    <span class="header-title">Filter calculator</span>
    <span class="badge">RC · CR</span>
  </div>

  <div class="section">
    <span class="sec-title">Values</span>
    <p class="hint-prompt">Fill in any two values — the third is computed for you. Leave one blank (or clear it) to solve for it.</p>
    <div class="fields-row">
      <div class="field">
        <label class="field-label" for="in-r">Resistance</label>
        <div class="input-group">
          <input type="number" id="in-r" value="10" min="0" step="any" oninput="solve()" placeholder="—">
          <select class="unit-select" id="in-ru" onchange="solve()" aria-label="Resistance unit">
            <option value="1">&Omega;</option>
            <option value="1e3" selected>k&Omega;</option>
            <option value="1e6">M&Omega;</option>
          </select>
        </div>
        <div class="solved-note" id="r-note"></div>
      </div>
      <div class="field">
        <label class="field-label" for="in-c">Capacitance</label>
        <div class="input-group">
          <input type="number" id="in-c" value="47" min="0" step="any" oninput="solve()" placeholder="—">
          <select class="unit-select" id="in-cu" onchange="solve()" aria-label="Capacitance unit">
            <option value="1e-12">pF</option>
            <option value="1e-9" selected>nF</option>
            <option value="1e-6">&micro;F</option>
          </select>
        </div>
        <div class="solved-note" id="c-note"></div>
      </div>
      <div class="field">
        <label class="field-label" for="in-f">Target frequency</label>
        <div class="input-group">
          <input type="number" id="in-f" min="0" step="any" oninput="solve()" placeholder="—">
          <select class="unit-select" id="in-fu" onchange="solve()" aria-label="Frequency unit">
            <option value="1">Hz</option>
            <option value="1e3" selected>kHz</option>
            <option value="1e6">MHz</option>
          </select>
        </div>
        <div class="solved-note" id="f-note"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <span class="sec-title">Results</span>
    <div class="result-grid">
      <div class="result-card">
        <div class="result-label">&minus;3 dB frequency</div>
        <div class="result-value accent" id="out-fc">&mdash;</div>
        <div class="result-unit" id="out-fc-unit"></div>
      </div>
      <div class="result-card">
        <div class="result-label">Time constant &tau;</div>
        <div class="result-value" id="out-tau">&mdash;</div>
        <div class="result-unit" id="out-tau-unit"></div>
      </div>
      <div class="result-card" id="e24-card" style="display:none">
        <div class="result-label" id="e24-label">Nearest E24</div>
        <div class="result-value" id="out-e24">&mdash;</div>
        <div class="result-unit" id="out-e24-unit"></div>
      </div>
      <div class="result-card" id="e24-fc-card" style="display:none">
        <div class="result-label">Actual f<sub>c</sub> with E24</div>
        <div class="result-value" id="out-e24-fc">&mdash;</div>
        <div class="result-unit" id="out-e24-fc-unit"></div>
      </div>
    </div>
    <p class="hint" id="hint-text"></p>
  </div>

  <div class="chart-section">
    <span class="sec-title">Frequency response</span>
    <canvas id="chart" class="chart-canvas" role="img"
      aria-label="Bode magnitude plot showing low-pass (solid red) and high-pass (dashed blue) responses crossing at the cutoff frequency."></canvas>
    <p class="sr-only" id="chart-summary">Chart has no data yet.</p>
  </div>
</div>

<script>
// ═══ RC / CR Filter Calculator ════════════════════════════════════════════
// Given any two of {R, C, f} the third is solved from fc = 1/(2π·R·C). The
// canvas draws both low-pass (RC) and high-pass (CR) magnitude responses on
// the same axes with a −3 dB reference.
//
// Accessibility: high-pass trace is dashed so the chart is still
// interpretable for users with red/blue color blindness, and the canvas
// has an aria-label + textual summary that is updated on every solve.
// ═════════════════════════════════════════════════════════════════════════

// ── Shared color palette (kept in sync with other tools) ─────────────────
const COL = {
  bg:        '#fafbfc',
  grid:      '#e4e7ec',
  axis:      '#d0d4dc',
  text:      '#4a5261',
  textLight: '#6b7280',
  textDark:  '#1a1d23',
  red:       '#c0392b',  // low-pass, −3 dB reference
  blue:      '#4a6fa5',  // high-pass
};

// Chart type is always monospace for clean numeric alignment on axes and
// labels, independent of the surrounding UI font.
const FONT_MONO = (getComputedStyle(document.documentElement)
                     .getPropertyValue('--font-mono') || 'monospace').trim();

// ── E24 standard resistor / capacitor values ─────────────────────────────
const E24 = [
  1.0, 1.1, 1.2, 1.3, 1.5, 1.6, 1.8, 2.0,
  2.2, 2.4, 2.7, 3.0, 3.3, 3.6, 3.9, 4.3,
  4.7, 5.1, 5.6, 6.2, 6.8, 7.5, 8.2, 9.1
];

/** Nearest E24 value to `val` (searches one decade above/below for safety). */
function nearestE24(val) {
  if (!val || val <= 0) return null;
  const exp = Math.floor(Math.log10(val));
  let best = E24[0], bestDiff = Infinity;
  for (let i = -1; i <= 1; i++) {
    const mult = Math.pow(10, exp + i);
    for (const e of E24) {
      const d = Math.abs(e * mult - val);
      if (d < bestDiff) { bestDiff = d; best = e * mult; }
    }
  }
  return best;
}

// ── Value formatters ─────────────────────────────────────────────────────
// Each returns { v: displayValue, u: unitString } so the template can bind
// them to separate spans.
function fmtFreq(f) {
  if (!isFinite(f) || f <= 0) return { v: '\u2014', u: '' };
  if (f >= 1e6) return { v: (f / 1e6).toPrecision(4), u: 'MHz' };
  if (f >= 1e3) return { v: (f / 1e3).toPrecision(4), u: 'kHz' };
  return { v: f.toPrecision(4), u: 'Hz' };
}
function fmtR(r) {
  if (!isFinite(r) || r <= 0) return { v: '\u2014', u: '' };
  if (r >= 1e6) return { v: (r / 1e6).toPrecision(4), u: 'M\u03A9' };
  if (r >= 1e3) return { v: (r / 1e3).toPrecision(4), u: 'k\u03A9' };
  return { v: r.toPrecision(4), u: '\u03A9' };
}
function fmtC(c) {
  if (!isFinite(c) || c <= 0) return { v: '\u2014', u: '' };
  if (c >= 1e-3) return { v: (c * 1e3).toPrecision(4), u: 'mF' };
  if (c >= 1e-6) return { v: (c * 1e6).toPrecision(4), u: '\u00B5F' };
  if (c >= 1e-9) return { v: (c * 1e9).toPrecision(4), u: 'nF' };
  return { v: (c * 1e12).toPrecision(4), u: 'pF' };
}
function fmtTau(t) {
  if (!isFinite(t) || t <= 0) return { v: '\u2014', u: '' };
  if (t >= 1)    return { v: t.toPrecision(4),          u: 's'  };
  if (t >= 1e-3) return { v: (t * 1e3).toPrecision(4),  u: 'ms' };
  if (t >= 1e-6) return { v: (t * 1e6).toPrecision(4),  u: '\u00B5s' };
  return { v: (t * 1e9).toPrecision(4), u: 'ns' };
}
function fmtAxisFreq(f) {
  if (f >= 1e6) return (f / 1e6) + 'M';
  if (f >= 1e3) return (f / 1e3) + 'k';
  if (f < 1)    return f.toPrecision(2);
  return f + '';
}

function txt(id, v) { document.getElementById(id).textContent = v; }

// ═══ Bode plot rendering ═════════════════════════════════════════════════
// Draws both the low-pass (1 / √(1 + (f/fc)²)) and high-pass
// ((f/fc) / √(1 + (f/fc)²)) magnitude responses on the same log-frequency
// axis, centered on fc when one is known. Called with `null` before a
// solution exists — in that case axes are drawn but no curves.
function drawBode(fc) {
  // ── Canvas init: clear intrinsic size, measure, then scale for DPR ─────
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 1; canvas.height = 1;
  const rect = canvas.getBoundingClientRect();
  if (rect.width < 1 || rect.height < 1) return;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = rect.width, H = rect.height;
  const pad = { top: 28, right: 20, bottom: 38, left: 52 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  // Background
  ctx.fillStyle = COL.bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, W, H, 6);
  ctx.fill();

  // ── Axis transforms: x = log10(f), y = dB ──────────────────────────────
  // Fixed window 1 Hz – 100 kHz (5 decades). This matches the preamp
  // charts so every frequency-response plot in the app shares the same
  // x-axis range; users can see an fc outside this window from the result
  // cards even if the curve trails off-screen.
  const logMin = 0, logMax = 5;
  const dbMin = -12, dbMax = 0;

  function xOf(f)  { return pad.left + ((Math.log10(f) - logMin) / (logMax - logMin)) * pw; }
  function yOf(db) { return pad.top  + ((dbMax - db)             / (dbMax  - dbMin )) * ph; }

  // ── Grid lines (decade verticals + dB horizontals) ─────────────────────
  const firstDecade = Math.ceil(logMin), lastDecade = Math.floor(logMax);
  const decades = [];
  for (let d = firstDecade; d <= lastDecade; d++) decades.push(Math.pow(10, d));

  ctx.strokeStyle = COL.grid; ctx.lineWidth = 0.5;
  decades.forEach(f => {
    const x = xOf(f);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ph); ctx.stroke();
  });
  [-3, -6, -9].forEach(db => {
    const y = yOf(db);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + pw, y); ctx.stroke();
  });

  // ── −3 dB reference (dashed) + 0 dB axis ───────────────────────────────
  ctx.strokeStyle = COL.red; ctx.lineWidth = 0.7; ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(pad.left, yOf(-3)); ctx.lineTo(pad.left + pw, yOf(-3)); ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = COL.axis; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, yOf(0)); ctx.lineTo(pad.left + pw, yOf(0)); ctx.stroke();

  // ── Axis labels ────────────────────────────────────────────────────────
  ctx.fillStyle = COL.text; ctx.font = '11px ' + FONT_MONO;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  decades.forEach(f => ctx.fillText(fmtAxisFreq(f), xOf(f), pad.top + ph + 8));
  ctx.fillText('Hz', pad.left + pw + 10, pad.top + ph + 8);

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  [0, -3, -6, -9, -12].forEach(db => {
    if (db === -3) { ctx.fillStyle = COL.red;  ctx.font = 'bold 11px ' + FONT_MONO; }
    else           { ctx.fillStyle = COL.text; ctx.font = '11px '      + FONT_MONO; }
    ctx.fillText(db + ' dB', pad.left - 6, yOf(db));
  });

  // No solution yet — axes only.
  if (!fc || !isFinite(fc) || fc <= 0) return;

  const steps = 400;

  // ── Low-pass curve (solid): |H| = 1 / √(1 + (f/fc)²) ───────────────────
  ctx.strokeStyle = COL.red; ctx.lineWidth = 2.25;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const logF = logMin + (logMax - logMin) * (i / steps);
    const f = Math.pow(10, logF);
    const mag = 1 / Math.sqrt(1 + Math.pow(f / fc, 2));
    const db = 20 * Math.log10(mag);
    const x = xOf(f), y = yOf(Math.max(db, dbMin));
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // ── High-pass curve (dashed): |H| = (f/fc) / √(1 + (f/fc)²) ────────────
  // Dashed distinguishes the two traces without relying on color alone.
  ctx.strokeStyle = COL.blue; ctx.lineWidth = 2.25; ctx.setLineDash([7, 4]);
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const logF = logMin + (logMax - logMin) * (i / steps);
    const f = Math.pow(10, logF);
    const ratio = f / fc;
    const mag = ratio / Math.sqrt(1 + ratio * ratio);
    const db = 20 * Math.log10(mag);
    const x = xOf(f), y = yOf(Math.max(db, dbMin));
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // ── fc marker (dot + vertical drop + label) ────────────────────────────
  const xFc = xOf(fc), yFc = yOf(-3);
  ctx.fillStyle = COL.textDark;
  ctx.beginPath(); ctx.arc(xFc, yFc, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.setLineDash([3, 3]); ctx.strokeStyle = COL.textLight; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(xFc, yFc + 5); ctx.lineTo(xFc, pad.top + ph); ctx.stroke();
  ctx.setLineDash([]);
  const fcLabel = fc >= 1e6 ? (fc / 1e6).toPrecision(3) + ' MHz'
                : fc >= 1e3 ? (fc / 1e3).toPrecision(3) + ' kHz'
                :             fc.toPrecision(3)         + ' Hz';
  ctx.fillStyle = COL.textDark; ctx.font = 'bold 11px ' + FONT_MONO;
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('fc = ' + fcLabel, xFc, yFc - 8);

  // ── Legend (top-left) — line swatches mirror dashed/solid distinction ──
  const lx = pad.left + 8, ly = pad.top + 6;
  ctx.lineWidth = 2.25; ctx.font = '10px ' + FONT_MONO;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = COL.red;
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 16, ly); ctx.stroke();
  ctx.fillStyle = COL.red; ctx.fillText('Low-pass', lx + 20, ly);
  ctx.strokeStyle = COL.blue; ctx.setLineDash([5, 3]);
  ctx.beginPath(); ctx.moveTo(lx, ly + 14); ctx.lineTo(lx + 16, ly + 14); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = COL.blue; ctx.fillText('High-pass', lx + 20, ly + 14);
}

// ═══ Input helpers + main solver ═════════════════════════════════════════

/** Read a numeric field in SI base units. Returns null if empty/invalid. */
function getVal(inputId, unitId) {
  const raw = document.getElementById(inputId).value.trim();
  if (raw === '') return null;
  const v = parseFloat(raw) * parseFloat(document.getElementById(unitId).value);
  return (isFinite(v) && v > 0) ? v : null;
}

/** Toggle the "solved" note beneath a field. */
function showSolvedNote(noteId, text) {
  const el = document.getElementById(noteId);
  el.textContent = text;
  el.classList.add('is-on');
}
function clearSolvedNotes() {
  ['r-note', 'c-note', 'f-note'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '';
    el.classList.remove('is-on');
  });
}

/**
 * Main solve:
 *   fc = 1 / (2π · R · C),  τ = R · C = 1 / (2π · fc)
 * Given any two of {R, C, f} the third is derived. The UI shows the solved
 * value in a note below the corresponding input.
 */
function solve() {
  const r = getVal('in-r', 'in-ru');
  const c = getVal('in-c', 'in-cu');
  const f = getVal('in-f', 'in-fu');

  // Reset transient UI state every run.
  clearSolvedNotes();
  document.getElementById('e24-card').style.display = 'none';
  document.getElementById('e24-fc-card').style.display = 'none';

  const filled = (r ? 1 : 0) + (c ? 1 : 0) + (f ? 1 : 0);

  // Fewer than two inputs → no solution possible.
  if (filled < 2) {
    txt('out-fc',  '\u2014'); txt('out-fc-unit',  '');
    txt('out-tau', '\u2014'); txt('out-tau-unit', '');
    txt('hint-text', 'Enter any two values to solve for the third.');
    txt('chart-summary', 'Chart has no data yet.');
    lastFc = null;
    drawBode(null);
    return;
  }

  let fc, tau, solvedVar = null;

  // ── Branch A: R and C known → solve for f (fc) ───────────────────────────
  if (r && c && !f) {
    tau = r * c;
    fc = 1 / (2 * Math.PI * tau);
    solvedVar = 'f';
  }
  // ── Branch B: R and f known → solve for C (+ E24 capacitor suggestion) ───
  else if (r && f && !c) {
    fc = f;
    tau = 1 / (2 * Math.PI * fc);
    const cSolved = 1 / (2 * Math.PI * f * r);
    solvedVar = 'c';

    const cF = fmtC(cSolved);
    document.getElementById('e24-card').style.display = '';
    document.getElementById('e24-fc-card').style.display = '';
    txt('e24-label', 'Nearest E24 C');

    const e24 = nearestE24(cSolved);
    const eF = fmtC(e24);
    txt('out-e24', eF.v); txt('out-e24-unit', eF.u);
    const fcA = fmtFreq(1 / (2 * Math.PI * r * e24));
    txt('out-e24-fc', fcA.v); txt('out-e24-fc-unit', fcA.u);

    showSolvedNote('c-note', '= ' + cF.v + ' ' + cF.u);
  }
  // ── Branch C: C and f known → solve for R (+ E24 resistor suggestion) ────
  else if (c && f && !r) {
    fc = f;
    tau = 1 / (2 * Math.PI * fc);
    const rSolved = 1 / (2 * Math.PI * f * c);
    solvedVar = 'r';

    const rF = fmtR(rSolved);
    document.getElementById('e24-card').style.display = '';
    document.getElementById('e24-fc-card').style.display = '';
    txt('e24-label', 'Nearest E24 R');

    const e24 = nearestE24(rSolved);
    const eF = fmtR(e24);
    txt('out-e24', eF.v); txt('out-e24-unit', eF.u);
    const fcA = fmtFreq(1 / (2 * Math.PI * e24 * c));
    txt('out-e24-fc', fcA.v); txt('out-e24-fc-unit', fcA.u);

    showSolvedNote('r-note', '= ' + rF.v + ' ' + rF.u);
  }
  // ── Branch D: All three provided → use R and C, f is advisory ────────────
  else {
    tau = r * c;
    fc = 1 / (2 * Math.PI * tau);
  }

  if (!tau) tau = 1 / (2 * Math.PI * fc);

  // ── Write results ────────────────────────────────────────────────────────
  const fF = fmtFreq(fc); txt('out-fc',  fF.v); txt('out-fc-unit',  fF.u);
  const tF = fmtTau(tau); txt('out-tau', tF.v); txt('out-tau-unit', tF.u);

  if (solvedVar === 'f') {
    showSolvedNote('f-note', '= ' + fF.v + ' ' + fF.u);
    txt('hint-text', 'Computed f from R and C.');
  } else if (solvedVar === 'r') {
    txt('hint-text', 'Resistance computed from f and C.');
  } else if (solvedVar === 'c') {
    txt('hint-text', 'Capacitance computed from f and R.');
  } else {
    txt('hint-text', 'All three values provided — using R and C (f ignored).');
  }

  // Update the chart's screen-reader summary to reflect the current solve.
  txt('chart-summary',
    'Frequency response: low-pass and high-pass filters with cutoff frequency ' +
    fF.v + ' ' + fF.u + '.');

  lastFc = fc;
  drawBode(fc);
}

// Cached fc so resize can redraw without rerunning the solve + DOM updates.
let lastFc = null;

// ── Init ─────────────────────────────────────────────────────────────────
solve();
window.addEventListener('resize', () => drawBode(lastFc));
</script>
</body>
</html>
